services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: google-ai-mcp-backend
    restart: unless-stopped
    ports:
      - "11014:11014"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION:-us-central1}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:11014/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: google-ai-mcp-frontend
    restart: unless-stopped
    ports:
      - "11015:11015"
    depends_on:
      backend:
        condition: service_healthy
